<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Luna | CFW Tuner</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        button { background: #3a9ad9; border: none; padding: 15px; color: white; width: 100%; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Luna Tuning App</h1>
    <div id="status">Status: Disconnected</div>
    <button id="btn-connect" onclick="connectScooter()">Connect Scooter</button>
    <button onclick="toggleLight()">Licht umschalten</button>

    <script>
        let gattCharacteristic = null;

        async function connectScooter() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Ninebot' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                gattCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                document.getElementById('status').innerText = "Status: Connected";
            } catch (err) { alert("Verbindungsfehler: " + err.message); }
        }

        async function toggleLight() {
            if (!gattCharacteristic) { alert("Erst mit Scooter verbinden!"); return; }
            const lightOn = new Uint8Array([0x55, 0xAA, 0x03, 0x09, 0x01, 0x01, 0x02, 0xF1]);
            try {
                await gattCharacteristic.writeValue(lightOn);
                alert("Licht-Befehl gesendet!");
            } catch (err) { alert("Fehler: " + err.message); }
        }
    </script>
</body>
</html>
